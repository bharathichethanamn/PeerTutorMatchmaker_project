<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - PeerTutorMatchmaker</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-content">
                <a href="/" class="logo">🎓 PeerTutorMatchmaker</a>
                <ul class="nav-links">
                    <li><a href="/">Home</a></li>
                    <li><a href="/login">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Register Form -->
    <div style="min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 2rem 0; background: linear-gradient(135deg, var(--gray-50) 0%, var(--primary-bg) 100%);">
        <div class="card animate-slide-up" style="width: 100%; max-width: 600px; box-shadow: var(--shadow-xl);">
            <div class="card-header text-center" style="background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: white; border-radius: var(--radius-lg) var(--radius-lg) 0 0;">
                <h2 style="font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem;">🎓 Join Our Learning Community</h2>
                <p style="opacity: 0.9; margin-top: 0.5rem;">Connect with tutors and start your learning journey</p>
            </div>
            
            <div class="card-body">
                <form id="registerForm">
                    <div class="grid grid-cols-2">
                        <div class="form-group">
                            <label for="name" class="form-label">Full Name</label>
                            <input type="text" id="name" name="name" class="form-input" placeholder="Enter your full name" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" id="email" name="email" class="form-input" placeholder="Enter your email" required>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2">
                        <div class="form-group">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" id="password" name="password" class="form-input" placeholder="Create a password" required minlength="6">
                        </div>
                        
                        <div class="form-group">
                            <label for="role" class="form-label">I want to be a</label>
                            <select id="role" name="role" class="form-input" required onchange="toggleProfileFields()">
                                <option value="">Select role</option>
                                <option value="STUDENT">Student (Looking for help)</option>
                                <option value="TUTOR">Tutor (Offering help)</option>
                            </select>
                        </div>
                    </div>
                    
                    <!-- Profile Fields (shown based on role) -->
                    <div id="profileFields" class="hidden">
                        <div class="form-group">
                            <label for="subjects" class="form-label">Subjects of Interest <span style="color: var(--primary);">*</span></label>
                            <div class="subject-pills">
                                <div class="subject-pill"><input type="checkbox" id="subj-math" name="subjectCheck" value="Mathematics"><label for="subj-math">Mathematics</label></div>
                                <div class="subject-pill"><input type="checkbox" id="subj-physics" name="subjectCheck" value="Physics"><label for="subj-physics">Physics</label></div>
                                <div class="subject-pill"><input type="checkbox" id="subj-chemistry" name="subjectCheck" value="Chemistry"><label for="subj-chemistry">Chemistry</label></div>
                                <div class="subject-pill"><input type="checkbox" id="subj-biology" name="subjectCheck" value="Biology"><label for="subj-biology">Biology</label></div>
                                <div class="subject-pill"><input type="checkbox" id="subj-cs" name="subjectCheck" value="Computer Science"><label for="subj-cs">Computer Science</label></div>
                                <div class="subject-pill"><input type="checkbox" id="subj-programming" name="subjectCheck" value="Programming"><label for="subj-programming">Programming</label></div>
                                <div class="subject-pill"><input type="checkbox" id="subj-english" name="subjectCheck" value="English Literature"><label for="subj-english">English Literature</label></div>
                                <div class="subject-pill"><input type="checkbox" id="subj-writing" name="subjectCheck" value="Writing"><label for="subj-writing">Writing</label></div>
                                <div class="subject-pill"><input type="checkbox" id="subj-history" name="subjectCheck" value="History"><label for="subj-history">History</label></div>
                                <div class="subject-pill"><input type="checkbox" id="subj-geography" name="subjectCheck" value="Geography"><label for="subj-geography">Geography</label></div>
                                <div class="subject-pill"><input type="checkbox" id="subj-economics" name="subjectCheck" value="Economics"><label for="subj-economics">Economics</label></div>
                                <div class="subject-pill"><input type="checkbox" id="subj-business" name="subjectCheck" value="Business Studies"><label for="subj-business">Business Studies</label></div>
                                <div class="subject-pill"><input type="checkbox" id="subj-statistics" name="subjectCheck" value="Statistics"><label for="subj-statistics">Statistics</label></div>
                                <div class="subject-pill"><input type="checkbox" id="subj-spanish" name="subjectCheck" value="Spanish"><label for="subj-spanish">Spanish</label></div>
                                <div class="subject-pill"><input type="checkbox" id="subj-french" name="subjectCheck" value="French"><label for="subj-french">French</label></div>
                                <div class="subject-pill"><input type="checkbox" id="subj-art" name="subjectCheck" value="Art"><label for="subj-art">Art</label></div>
                                <div class="subject-pill"><input type="checkbox" id="subj-design" name="subjectCheck" value="Design"><label for="subj-design">Design</label></div>
                                <div class="subject-pill"><input type="checkbox" id="subj-psychology" name="subjectCheck" value="Psychology"><label for="subj-psychology">Psychology</label></div>
                            </div>
                            <input type="hidden" id="subjects" name="subjects">
                            <input type="text" id="customSubjects" class="form-input" placeholder="Add other subjects (comma-separated)" style="margin-top: 0.75rem;">
                            <small class="form-hint">Select from above or add custom subjects</small>
                        </div>
                        
                        <div class="grid grid-cols-2">
                            <div class="form-group">
                                <label for="skillLevel" class="form-label">Skill Level</label>
                                <select id="skillLevel" name="skillLevel" class="form-input">
                                    <option value="">Select level</option>
                                    <option value="Beginner">Beginner</option>
                                    <option value="Intermediate">Intermediate</option>
                                    <option value="Advanced">Advanced</option>
                                    <option value="Expert">Expert</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label for="availability" class="form-label">Availability</label>
                                <input type="text" id="availability" name="availability" class="form-input" placeholder="e.g., Weekends, Evenings">
                            </div>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-full" style="padding: 0.875rem; font-size: 1rem; margin-top: 0.5rem;">✨ Create My Account</button>
                </form>
            </div>
            
            <div class="card-footer text-center">
                <p style="color: var(--gray-600); font-size: 0.875rem;">
                    Already have an account? 
                    <a href="/login" style="color: var(--primary-color); text-decoration: none; font-weight: 500;">Sign in here</a>
                </p>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        function toggleProfileFields() {
            const role = document.getElementById('role').value;
            const profileFields = document.getElementById('profileFields');
            
            if (role) {
                profileFields.classList.remove('hidden');
            } else {
                profileFields.classList.add('hidden');
            }
        }

        // Handle subject selection
        document.addEventListener('DOMContentLoaded', function() {
            const checkboxes = document.querySelectorAll('input[name="subjectCheck"]');
            const subjectsInput = document.getElementById('subjects');
            const customSubjectsInput = document.getElementById('customSubjects');

            function updateSubjects() {
                const selectedSubjects = Array.from(checkboxes)
                    .filter(cb => cb.checked)
                    .map(cb => cb.value);
                
                const customSubjects = customSubjectsInput.value
                    .split(',')
                    .map(s => s.trim())
                    .filter(s => s.length > 0);
                
                const allSubjects = [...selectedSubjects, ...customSubjects];
                subjectsInput.value = allSubjects.join(', ');
            }

            checkboxes.forEach(cb => cb.addEventListener('change', updateSubjects));
            customSubjectsInput.addEventListener('input', updateSubjects);
        });
    </script>
</body>
</html>
