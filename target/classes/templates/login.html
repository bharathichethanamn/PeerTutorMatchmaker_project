<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PeerTutorMatchmaker</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-content">
                <a href="/" class="logo">🎓 PeerTutorMatchmaker</a>
                <ul class="nav-links">
                    <li><a href="/">Home</a></li>
                    <li><a href="/register">Register</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Login Form -->
    <div style="min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 2rem 0;">
        <div class="card" style="width: 100%; max-width: 400px;">
            <div class="card-header text-center">
                <h2 style="font-size: 1.5rem; font-weight: 600; color: var(--gray-800);">Welcome Back</h2>
                <p style="color: var(--gray-600); margin-top: 0.5rem;">Sign in to your account</p>
            </div>
            
            <div class="card-body">
                <form id="loginForm">
                    <div class="form-group">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" id="email" name="email" class="form-input" placeholder="Enter your email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-full">Sign In</button>
                </form>
                
                <!-- Demo Accounts -->
                <div style="margin-top: 2rem; padding: 1rem; background: var(--gray-50); border-radius: var(--border-radius);">
                    <h4 style="font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--gray-700);">Demo Accounts:</h4>
                    <div style="font-size: 0.75rem; color: var(--gray-600); line-height: 1.4;">
                        <p><strong>Tutor:</strong> tutor@example.com / password</p>
                        <p><strong>Student:</strong> student@example.com / password</p>
                    </div>
                </div>
            </div>
            
            <div class="card-footer text-center">
                <p style="color: var(--gray-600); font-size: 0.875rem;">
                    Don't have an account? 
                    <a href="/register" style="color: var(--primary-color); text-decoration: none; font-weight: 500;">Sign up here</a>
                </p>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
